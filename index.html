<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Landing Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background: #f4f4f9;
      color: #333;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 40px 20px;
    }
    header h1 {
      margin: 0;
      font-size: 2.5em;
    }
    header p {
      margin-top: 10px;
      font-size: 1.2em;
    }
    .content {
      padding: 40px 20px;
    }
    .btn {
      display: inline-block;
      padding: 12px 25px;
      margin-top: 20px;
      background: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: #45a049;
    }
    footer {
      background: #333;
      color: white;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Landing Page</h1>
    <p>A simple, clean design for quick projects</p>
  </header>

  <div class="content">
    <h2>About This Page</h2>
    <p>This is a lightweight landing page template you can customize for your project, portfolio, or class notes.</p>
    <a href="#signup" class="btn">Get Started</a>
  </div>

  <footer>
    <p>&copy; 2026 My Landing Page. All rights reserved.</p>
  </footer>
</body>
</html>
